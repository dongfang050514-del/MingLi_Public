<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MingLi 命理阁</title>
  <link rel="stylesheet" href="./home.css">
</head>
<body>
  <main class="home-shell" aria-label="MingLi 主界面">
    <header class="home-top">
      <a class="brand" href="./index.html" aria-label="MingLi 首页">
        <span>命</span>
        <strong>MingLi</strong>
      </a>
      <p>命理阁</p>
    </header>

    <section class="gate-hero" aria-label="功能选择">
      <div class="hero-copy">
        <p class="eyebrow">玄学工具台</p>
        <h1>择一门入局</h1>
      </div>

      <div class="tool-gates">
        <a class="tool-gate gate-bazi" href="./bazi/index.html" aria-label="进入本命八字">
          <span class="gate-seal">八字</span>
          <span class="gate-visual bazi-visual" aria-hidden="true">
            <b></b><b></b><b></b><b></b>
          </span>
          <strong>本命八字</strong>
          <em>生辰命盘</em>
          <i aria-hidden="true"></i>
        </a>

        <a class="tool-gate gate-liuyao" href="./liuyao/index.html" aria-label="进入小六爻">
          <span class="gate-seal">六爻</span>
          <span class="gate-visual liuyao-visual" aria-hidden="true">
            <b></b><b></b><b></b><b></b><b></b><b></b>
          </span>
          <strong>小六爻</strong>
          <em>一事成卦</em>
          <i aria-hidden="true"></i>
        </a>
      </div>
    </section>

    <nav class="bottom-route" aria-label="快速进入">
      <a href="./bazi/index.html">八字</a>
      <a href="./liuyao/index.html">小六爻</a>
    </nav>
  </main>
  <script src="./route.js"></script>
</body>
</html>
