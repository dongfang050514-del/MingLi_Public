<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MingLi 小六爻</title>
  <style>
:root {
  --ink: #091615;
  --ink-2: #10201e;
  --jade: #1f5a50;
  --copper: #b8783b;
  --copper-2: #d6a25e;
  --paper: #f5ead1;
  --paper-soft: rgba(245, 234, 209, 0.76);
  --red: #9a3b2f;
  --line: rgba(245, 234, 209, 0.22);
  --shadow: 0 26px 70px rgba(0, 0, 0, 0.38);
  --ease: cubic-bezier(0.18, 0.86, 0.18, 1);
}

* {
  box-sizing: border-box;
}

html {
  min-height: 100%;
  background: var(--ink);
}

body {
  min-height: 100svh;
  margin: 0;
  color: var(--paper);
  background:
    radial-gradient(circle at 50% -10%, rgba(214, 162, 94, 0.24), transparent 28%),
    radial-gradient(circle at 8% 22%, rgba(31, 90, 80, 0.48), transparent 30%),
    linear-gradient(160deg, #06100f 0%, #10201e 54%, #23140f 100%);
  font-family: "Noto Serif SC", "Songti SC", "Microsoft YaHei", serif;
  overflow-x: hidden;
  transition: opacity 220ms var(--ease), filter 220ms var(--ease), transform 220ms var(--ease);
}

body::before {
  position: fixed;
  inset: 0;
  pointer-events: none;
  background:
    linear-gradient(rgba(245, 234, 209, 0.028) 1px, transparent 1px),
    linear-gradient(90deg, rgba(245, 234, 209, 0.022) 1px, transparent 1px);
  background-size: 42px 42px;
  content: "";
  opacity: 0.52;
}

body::after {
  position: fixed;
  inset: 0;
  pointer-events: none;
  background:
    linear-gradient(90deg, transparent, rgba(245, 234, 209, 0.045), transparent),
    repeating-linear-gradient(115deg, transparent 0 34px, rgba(245, 234, 209, 0.025) 35px 36px);
  mix-blend-mode: screen;
  content: "";
  opacity: 0.26;
}

.oracle-ambient {
  position: fixed;
  inset: 0;
  overflow: hidden;
  pointer-events: none;
  z-index: 0;
}

.ambient-ring {
  position: absolute;
  left: 50%;
  top: 52%;
  width: min(92vw, 390px);
  aspect-ratio: 1;
  border: 1px solid rgba(214, 162, 94, 0.14);
  border-radius: 50%;
  transform: translate(-50%, -50%);
}

.ambient-ring::before,
.ambient-ring::after {
  position: absolute;
  inset: 12%;
  border: 1px dashed rgba(245, 234, 209, 0.08);
  border-radius: 50%;
  content: "";
}

.ambient-ring::after {
  inset: 28%;
  border-style: solid;
  opacity: 0.74;
}

.ambient-coin,
.ambient-line {
  position: absolute;
  opacity: 0.36;
}

.ambient-coin {
  width: 64px;
  height: 64px;
  background:
    radial-gradient(circle, transparent 0 22%, rgba(54, 35, 18, 0.3) 23% 30%, transparent 31%),
    radial-gradient(circle at 34% 30%, rgba(247, 215, 149, 0.56), rgba(184, 120, 59, 0.24) 68%, transparent 70%);
  border: 1px solid rgba(214, 162, 94, 0.22);
  border-radius: 50%;
  filter: blur(0.1px);
  animation: ambientFloat 8400ms ease-in-out infinite;
}

.coin-one {
  left: -18px;
  top: 24%;
}

.coin-two {
  right: -22px;
  bottom: 18%;
  animation-delay: -2800ms;
}

.ambient-line {
  width: 160px;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(245, 234, 209, 0.24), transparent);
  transform: rotate(-28deg);
}

.line-one {
  right: -24px;
  top: 34%;
}

.line-two {
  left: -38px;
  bottom: 28%;
  transform: rotate(24deg);
}

body.is-leaving {
  opacity: 0;
  filter: blur(8px);
  transform: scale(0.985);
}

button,
textarea,
input {
  font: inherit;
}

button,
a {
  -webkit-tap-highlight-color: transparent;
}

.oracle-shell {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 440px;
  min-height: 100svh;
  margin: 0 auto;
  padding: calc(max(14px, env(safe-area-inset-top)) + 50px) 14px max(18px, env(safe-area-inset-bottom));
}

body[data-stage="entry"] .oracle-shell {
  padding-bottom: max(14px, env(safe-area-inset-bottom));
}

.product-nav {
  position: fixed;
  top: max(10px, env(safe-area-inset-top));
  left: 50%;
  z-index: 50;
  display: grid;
  width: min(360px, calc(100% - 28px));
  min-height: 42px;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 4px;
  padding: 4px;
  color: rgba(245, 234, 209, 0.84);
  background: rgba(8, 17, 16, 0.68);
  border: 1px solid rgba(245, 234, 209, 0.18);
  border-radius: 999px;
  box-shadow: 0 18px 42px rgba(0, 0, 0, 0.28);
  backdrop-filter: blur(14px);
  transform: translateX(-50%);
}

.product-nav a {
  display: grid;
  place-items: center;
  min-width: 0;
  color: inherit;
  text-decoration: none;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 900;
}

.product-nav a.is-active {
  color: #15100b;
  background: linear-gradient(145deg, var(--paper), var(--copper-2));
}

body[data-stage="cast"] .product-nav,
body[data-stage="result"] .product-nav {
  opacity: 0;
  pointer-events: none;
  transform: translate(-50%, -120%) scale(0.94);
  transform-origin: top center;
}

.site-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  min-height: 46px;
  transition: opacity 260ms var(--ease), transform 260ms var(--ease), min-height 260ms var(--ease);
}

body[data-stage="cast"] .site-top,
body[data-stage="result"] .site-top {
  height: 0;
  min-height: 0;
  margin: 0;
  overflow: hidden;
  opacity: 0;
  pointer-events: none;
  transform: translateY(-18px);
}

.brand,
.switch-link,
.secondary-link {
  color: var(--paper);
  text-decoration: none;
}

.brand {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  font-size: 14px;
  letter-spacing: 0;
}

.brand span {
  display: grid;
  width: 28px;
  height: 28px;
  place-items: center;
  color: #111514;
  background: linear-gradient(145deg, var(--paper), var(--copper-2));
  border-radius: 50%;
  font-weight: 900;
}

.switch-link,
.secondary-link {
  min-height: 34px;
  padding: 8px 12px;
  color: rgba(245, 234, 209, 0.78);
  background: rgba(245, 234, 209, 0.07);
  border: 1px solid var(--line);
  border-radius: 999px;
  font-size: 12px;
  font-weight: 800;
}

.stage {
  display: none;
  min-height: calc(100svh - 66px);
  animation: stageIn 360ms var(--ease) both;
}

.stage.is-active {
  display: grid;
  align-content: center;
  gap: 16px;
}

body[data-stage="cast"] .oracle-shell,
body[data-stage="result"] .oracle-shell {
  padding-top: max(10px, env(safe-area-inset-top));
}

.stage-cast.is-active,
.stage-result.is-active {
  min-height: calc(100svh - max(22px, env(safe-area-inset-top)) - max(18px, env(safe-area-inset-bottom)));
  align-content: stretch;
}

.stage-result.is-active {
  gap: 10px;
}

.hero-panel,
.question-panel,
.cast-board,
.result-frame {
  position: relative;
  overflow: hidden;
  border: 1px solid rgba(214, 162, 94, 0.34);
  border-radius: 12px;
  box-shadow: var(--shadow), inset 0 0 0 1px rgba(255, 255, 255, 0.06);
}

.hero-panel {
  display: grid;
  align-content: end;
  min-height: 292px;
  padding: 28px 24px;
  background:
    linear-gradient(90deg, rgba(245, 234, 209, 0.08) 1px, transparent 1px),
    linear-gradient(rgba(245, 234, 209, 0.06) 1px, transparent 1px),
    radial-gradient(circle at 80% 10%, rgba(214, 162, 94, 0.24), transparent 32%),
    linear-gradient(150deg, rgba(31, 90, 80, 0.9), rgba(8, 17, 16, 0.86) 62%, rgba(87, 45, 28, 0.82));
  background-size: 34px 34px, 34px 34px, auto, auto;
}

.hero-panel::before {
  position: absolute;
  inset: 14px;
  pointer-events: none;
  border: 1px solid rgba(245, 234, 209, 0.11);
  border-radius: 9px;
  content: "";
}

.hero-panel::after,
.result-frame::after {
  position: absolute;
  right: -16px;
  bottom: -18px;
  color: rgba(245, 234, 209, 0.08);
  content: "卦";
  font-family: Georgia, "Times New Roman", serif;
  font-size: 174px;
  font-weight: 900;
  line-height: 0.75;
}

.eyebrow {
  margin: 0 0 8px;
  color: var(--copper-2);
  font-size: 12px;
  font-weight: 900;
}

h1,
h2,
h3,
p {
  margin-top: 0;
}

h1 {
  margin-bottom: 12px;
  font-size: clamp(46px, 15vw, 68px);
  line-height: 0.95;
}

.hero-line {
  position: relative;
  z-index: 2;
  max-width: 13em;
  margin-bottom: 0;
  color: rgba(245, 234, 209, 0.74);
  font-size: 16px;
  line-height: 1.8;
}

.ritual-mark {
  position: absolute;
  left: 50%;
  top: 30px;
  display: grid;
  width: 160px;
  height: 160px;
  place-items: center;
  border: 1px solid rgba(214, 162, 94, 0.38);
  border-radius: 50%;
  box-shadow: inset 0 0 0 12px rgba(245, 234, 209, 0.035), 0 0 34px rgba(214, 162, 94, 0.18);
  opacity: 0.92;
  transform: translateX(-50%);
  animation: ritualPulse 5200ms ease-in-out infinite;
}

.ritual-mark::before,
.ritual-mark::after {
  position: absolute;
  border-radius: 50%;
  content: "";
}

.ritual-mark::before {
  inset: 20px;
  border: 1px dashed rgba(245, 234, 209, 0.22);
}

.ritual-mark::after {
  inset: 42px;
  background: radial-gradient(circle, rgba(214, 162, 94, 0.34), rgba(214, 162, 94, 0.03) 62%, transparent 66%);
}

.ritual-mark span {
  position: absolute;
  left: 43px;
  width: 74px;
  height: 5px;
  background: linear-gradient(90deg, var(--paper), var(--copper-2));
  border-radius: 999px;
  box-shadow: 0 0 14px rgba(214, 162, 94, 0.22);
}

.ritual-mark span:nth-child(1) { top: 48px; }
.ritual-mark span:nth-child(2) { top: 60px; width: 28px; box-shadow: 46px 0 0 var(--copper-2); }
.ritual-mark span:nth-child(3) { top: 72px; }
.ritual-mark span:nth-child(4) { top: 84px; width: 28px; box-shadow: 46px 0 0 var(--copper-2); }
.ritual-mark span:nth-child(5) { top: 96px; }
.ritual-mark span:nth-child(6) { top: 108px; width: 28px; box-shadow: 46px 0 0 var(--copper-2); }

.question-panel {
  display: grid;
  gap: 12px;
  padding: 16px;
  background: rgba(8, 17, 16, 0.72);
}

.direct-cast {
  display: grid;
  gap: 8px;
  padding: 16px;
  background:
    radial-gradient(circle at 88% 18%, rgba(214, 162, 94, 0.18), transparent 30%),
    rgba(245, 234, 209, 0.07);
  border: 1px solid rgba(245, 234, 209, 0.16);
  border-radius: 10px;
}

.direct-cast span,
.optional-question summary {
  color: var(--copper-2);
  font-size: 12px;
  font-weight: 900;
}

.direct-cast strong {
  color: var(--paper);
  font-size: 22px;
  line-height: 1.2;
}

.direct-cast p {
  margin: 0;
  color: rgba(245, 234, 209, 0.68);
  font-size: 14px;
  line-height: 1.7;
}

.optional-question {
  display: grid;
  gap: 12px;
}

.optional-question summary {
  display: grid;
  min-height: 40px;
  align-items: center;
  padding: 0 12px;
  list-style: none;
  background: rgba(245, 234, 209, 0.06);
  border: 1px solid rgba(245, 234, 209, 0.14);
  border-radius: 999px;
  cursor: pointer;
}

.optional-question summary::-webkit-details-marker {
  display: none;
}

.optional-question summary::after {
  justify-self: end;
  margin-top: -18px;
  color: rgba(245, 234, 209, 0.56);
  content: "展开";
  font-size: 11px;
}

.optional-question[open] summary::after {
  content: "收起";
}

.optional-question[open] {
  gap: 12px;
}

.field {
  display: grid;
  gap: 8px;
}

.field span,
.topic-grid legend {
  color: rgba(245, 234, 209, 0.68);
  font-size: 12px;
  font-weight: 900;
}

textarea {
  width: 100%;
  min-height: 96px;
  resize: none;
  padding: 14px;
  color: var(--paper);
  background: rgba(245, 234, 209, 0.08);
  border: 1px solid rgba(245, 234, 209, 0.18);
  border-radius: 10px;
  outline: none;
  line-height: 1.65;
}

textarea:focus {
  border-color: rgba(214, 162, 94, 0.64);
  box-shadow: 0 0 0 3px rgba(214, 162, 94, 0.12);
}

.templates,
.topic-grid {
  display: grid;
  gap: 8px;
}

.templates {
  grid-template-columns: repeat(4, minmax(0, 1fr));
  padding-bottom: 2px;
  scrollbar-width: none;
}

.templates::-webkit-scrollbar,
.topic-options::-webkit-scrollbar {
  display: none;
}

.templates button,
.topic-grid span {
  display: grid;
  min-height: 40px;
  place-items: center;
  padding: 8px 10px;
  color: rgba(245, 234, 209, 0.8);
  background: rgba(245, 234, 209, 0.07);
  border: 1px solid rgba(245, 234, 209, 0.16);
  border-radius: 8px;
  font-size: 12px;
  font-weight: 900;
  white-space: nowrap;
}

.topic-grid {
  grid-template-columns: repeat(2, minmax(0, 1fr));
  margin: 0;
  padding: 0;
  border: 0;
}

.topic-scroll {
  display: grid;
  gap: 8px;
  grid-template-columns: 1fr;
}

.topic-grid legend {
  grid-column: 1 / -1;
}

.topic-options {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 8px;
  padding-bottom: 2px;
  scrollbar-width: none;
}

.topic-grid label {
  min-width: 0;
}

.topic-grid input {
  position: absolute;
  opacity: 0;
}

.topic-grid input:checked + span {
  color: #101514;
  background: linear-gradient(145deg, var(--paper), var(--copper-2));
  border-color: rgba(245, 234, 209, 0.72);
}

.primary-action,
.secondary-action {
  min-height: 48px;
  padding: 0 18px;
  color: #101514;
  background: linear-gradient(145deg, var(--paper), var(--copper-2));
  border: 0;
  border-radius: 999px;
  box-shadow: 0 14px 28px rgba(0, 0, 0, 0.24);
  font-weight: 900;
}

.secondary-action {
  color: var(--paper);
  background: rgba(245, 234, 209, 0.08);
  border: 1px solid rgba(245, 234, 209, 0.18);
  box-shadow: none;
}

.primary-action:disabled,
.secondary-action:disabled {
  opacity: 0.42;
}

body[data-stage="cast"] #castButton:not(:disabled) {
  animation: castPulse 1800ms ease-in-out infinite;
}

.cast-head,
.result-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
}

.cast-head h2,
.result-head h2 {
  margin-bottom: 6px;
  font-size: 28px;
}

.cast-head p:last-child {
  margin-bottom: 0;
  color: rgba(245, 234, 209, 0.66);
  line-height: 1.7;
}

.cast-board {
  display: grid;
  min-height: 470px;
  align-content: space-between;
  padding: 18px;
  background:
    linear-gradient(90deg, rgba(245, 234, 209, 0.045) 1px, transparent 1px),
    linear-gradient(rgba(245, 234, 209, 0.036) 1px, transparent 1px),
    radial-gradient(circle at 50% 35%, rgba(184, 120, 59, 0.24), transparent 32%),
    linear-gradient(180deg, rgba(19, 41, 38, 0.94), rgba(8, 17, 16, 0.94));
  background-size: 36px 36px, 36px 36px, auto, auto;
}

.cast-board::before {
  position: absolute;
  inset: 54px 24px auto;
  height: 260px;
  pointer-events: none;
  background:
    radial-gradient(circle, transparent 0 32%, rgba(214, 162, 94, 0.22) 33% 34%, transparent 35%),
    conic-gradient(from 0deg, transparent 0 11%, rgba(214, 162, 94, 0.24) 11% 12%, transparent 12% 24%, rgba(245, 234, 209, 0.18) 24% 25%, transparent 25%);
  border-radius: 50%;
  content: "";
  opacity: 0.6;
  animation: ritualRotate 18000ms linear infinite;
}

.cast-board::after {
  position: absolute;
  left: 50%;
  top: 72px;
  width: 1px;
  height: 250px;
  pointer-events: none;
  background: linear-gradient(180deg, transparent, rgba(214, 162, 94, 0.5), transparent);
  content: "";
  transform: translateX(-50%);
}

.hexagram-lines {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column-reverse;
  gap: 10px;
  width: min(100%, 260px);
  margin: 0 auto;
}

.yao-line {
  display: grid;
  grid-template-columns: 42px minmax(0, 1fr) 54px;
  gap: 10px;
  align-items: center;
  min-height: 32px;
  color: rgba(245, 234, 209, 0.54);
}

.yao-index {
  color: var(--copper-2);
  font-family: Georgia, "Times New Roman", serif;
  font-weight: 900;
}

.yao-stroke {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
  height: 12px;
  align-items: center;
}

.yao-stroke i {
  display: block;
  height: 5px;
  background: rgba(245, 234, 209, 0.2);
  border-radius: 999px;
}

.yao-line.is-yin .yao-stroke {
  grid-template-columns: 1fr 1fr;
}

.yao-line.is-filled .yao-stroke i {
  background: linear-gradient(90deg, var(--paper), var(--copper-2));
  box-shadow: 0 0 18px rgba(214, 162, 94, 0.35);
  animation: lineLand 420ms var(--ease) both;
}

.yao-line.is-moving .yao-mark {
  color: #f3d0bd;
}

.yao-line.is-active {
  color: var(--paper);
  transform: translateX(3px);
}

.coin-tray {
  position: relative;
  z-index: 2;
  display: flex;
  justify-content: center;
  gap: 10px;
  min-height: 128px;
  align-items: center;
}

.coin {
  display: grid;
  width: 72px;
  height: 72px;
  place-items: center;
  color: #21150d;
  background:
    radial-gradient(circle, transparent 0 21%, rgba(54, 35, 18, 0.35) 22% 28%, transparent 29%),
    radial-gradient(circle at 35% 30%, #f7d795, #b8783b 66%, #5d351b);
  border: 3px solid rgba(245, 234, 209, 0.42);
  border-radius: 50%;
  box-shadow: 0 14px 24px rgba(0, 0, 0, 0.28);
  font-weight: 900;
}

.coin-tray.is-throwing .coin-a {
  animation: coinDropA 520ms var(--ease) both;
}

.coin-tray.is-throwing .coin-b {
  animation: coinDropB 520ms var(--ease) both;
}

.coin-tray.is-throwing .coin-c {
  animation: coinDropC 520ms var(--ease) both;
}

.term-stream {
  position: relative;
  z-index: 2;
  display: flex;
  min-height: 34px;
  align-items: center;
  justify-content: center;
  gap: 8px;
  overflow: hidden;
}

.term-stream span {
  padding: 6px 10px;
  color: rgba(245, 234, 209, 0.72);
  background: rgba(245, 234, 209, 0.07);
  border: 1px solid rgba(214, 162, 94, 0.24);
  border-radius: 999px;
  font-size: 11px;
  font-weight: 900;
  animation: termFloat 2400ms ease-in-out infinite;
}

.term-stream span:nth-child(2) {
  animation-delay: 260ms;
}

.term-stream span:nth-child(3) {
  animation-delay: 520ms;
}

.term-stream span:nth-child(4) {
  animation-delay: 780ms;
}

.cast-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.result-frame {
  display: grid;
  grid-template-rows: auto minmax(0, 1fr) 18px auto;
  gap: 14px;
  min-height: calc(100svh - 150px);
  padding: 18px 14px 14px;
  background:
    radial-gradient(circle at 50% 0%, rgba(245, 234, 209, 0.12), transparent 24%),
    linear-gradient(90deg, rgba(245, 234, 209, 0.052) 1px, transparent 1px),
    linear-gradient(rgba(245, 234, 209, 0.042) 1px, transparent 1px),
    radial-gradient(circle at 76% 10%, rgba(214, 162, 94, 0.2), transparent 32%),
    linear-gradient(165deg, rgba(32, 78, 69, 0.9), rgba(10, 20, 19, 0.95) 64%, rgba(49, 28, 18, 0.9));
  background-size: auto, 40px 40px, 40px 40px, auto, auto;
}

.result-frame::before {
  position: absolute;
  left: 14px;
  right: 14px;
  top: 94px;
  height: 28px;
  pointer-events: none;
  background:
    linear-gradient(180deg, rgba(92, 57, 28, 0.96), rgba(35, 21, 13, 0.95)),
    linear-gradient(90deg, transparent, rgba(245, 234, 209, 0.16), transparent);
  border: 1px solid rgba(214, 162, 94, 0.32);
  border-radius: 999px;
  box-shadow: 0 16px 26px rgba(0, 0, 0, 0.26), inset 0 1px 0 rgba(255, 255, 255, 0.16);
  content: "";
}

.result-rail {
  position: absolute;
  left: 0;
  right: 0;
  top: 106px;
  z-index: 1;
  pointer-events: none;
}

.result-rail span {
  position: absolute;
  top: 0;
  width: 2px;
  height: 94px;
  background: linear-gradient(180deg, rgba(214, 162, 94, 0.85), rgba(245, 234, 209, 0.18));

const state = {

document.querySelectorAll("[data-template]").forEach((button) => {
  button.addEventListener("click", () => {
    questionInput.value = button.dataset.template;
    const topicInput = button.dataset.topic ? form.querySelector(`[name="topic"][value="${button.dataset.topic}"]`) : null;
    if (topicInput) topicInput.checked = true;
    questionInput.focus();
  });
});

form.addEventListener("submit", (event) => {
  event.preventDefault();
  state.question = questionInput.value.trim() || "心中默念之事";
  state.topic = new FormData(form).get("topic") || "general";
  resetCast();
  setStage("cast");
});

castButton.addEventListener("click", () => throwOneLine());
rethinkButton.addEventListener("click", () => {
  resetCast();
  setStage("entry");
});
prevSign.addEventListener("click", () => setResultPage(state.page - 1, "prev"));
nextSign.addEventListener("click", () => setResultPage(state.page + 1, "next"));
restartButton.addEventListener("click", () => {
  resetCast();
  setStage("entry");
});

signStage.addEventListener("touchstart", (event) => {
  const touch = event.touches[0];
  if (!touch) return;
  state.startX = touch.clientX;
  state.startY = touch.clientY;
  state.swiping = true;
}, { passive: true });

signStage.addEventListener("touchmove", (event) => {
  if (!state.swiping) return;
  const touch = event.touches[0];
  if (!touch) return;
  const dx = touch.clientX - state.startX;
  const dy = touch.clientY - state.startY;
  if (Math.abs(dx) > 18 && Math.abs(dx) > Math.abs(dy) * 1.15) event.preventDefault();
}, { passive: false });

signStage.addEventListener("touchend", (event) => {
  if (!state.swiping) return;
  state.swiping = false;
  const touch = event.changedTouches[0];
  if (!touch) return;
  finishSwipe(touch.clientX - state.startX, touch.clientY - state.startY);
}, { passive: true });

function setStage(stage) {
  document.body.dataset.stage = stage;
  Object.entries(stageEls).forEach(([key, element]) => {
    element.classList.toggle("is-active", key === stage);
  });
  window.scrollTo(0, 0);
}

function initLines() {
  lineBox.replaceChildren();
  for (let index = 0; index < 6; index += 1) {
    const row = document.createElement("div");
    row.className = "yao-line";
    row.dataset.index = String(index);
    row.innerHTML = `
      <span class="yao-index">${String(index + 1).padStart(2, "0")}</span>
      <span class="yao-stroke"><i></i><i></i></span>
      <span class="yao-mark">待摇</span>
    `;
    lineBox.append(row);
  }
  updateLineState();
}

function resetCast() {
  state.lines = [];
  state.pages = [];
  state.page = 0;
  castButton.disabled = false;
  rethinkButton.disabled = false;
  castHint.textContent = "等心里那一刻到了，亲手抛下 6 次。";
  initLines();
}

function throwOneLine() {
  if (state.lines.length >= 6) return;
  castButton.disabled = true;
  rethinkButton.disabled = true;
  coinTray.classList.remove("is-throwing");
  void coinTray.offsetWidth;
  coinTray.classList.add("is-throwing");

  window.setTimeout(() => {
    const line = createLine();
    state.lines.push(line);
    updateCoins(line);
    updateLineState();
    castButton.disabled = state.lines.length >= 6;
    rethinkButton.disabled = false;
    if (state.lines.length >= 6) {
      castHint.textContent = "结果已成，正在整理判断。";
      window.setTimeout(showResult, 900);
      return;
    }
    const left = 6 - state.lines.length;
    castHint.textContent = `第 ${state.lines.length} 次已落，还剩 ${left} 次。等你觉得该落了，再抛下一次。`;
  }, 520);
}

function createLine() {
  const coins = Array.from({ length: 3 }, () => Math.random() > 0.5 ? "阳" : "阴");
  const yangCount = coins.filter((coin) => coin === "阳").length;
  if (yangCount === 3) return { coins, yang: true, moving: true, label: "动静很大" };
  if (yangCount === 2) return { coins, yang: false, moving: false, label: "先稳住" };
  if (yangCount === 1) return { coins, yang: true, moving: false, label: "可推进" };
  return { coins, yang: false, moving: true, label: "会有变化" };
}

function updateCoins(line) {
  [...coinTray.querySelectorAll(".coin")].forEach((coin, index) => {
    coin.textContent = line.coins[index] === "阳" ? "正" : "反";
  });
}

function updateLineState() {
  const rows = [...lineBox.querySelectorAll(".yao-line")];
  rows.forEach((row, index) => {
    const line = state.lines[index];
    row.classList.toggle("is-active", index === state.lines.length && state.lines.length < 6);
    row.classList.toggle("is-filled", Boolean(line));
    row.classList.toggle("is-yin", line ? !line.yang : false);
    row.classList.toggle("is-moving", line?.moving || false);
    row.querySelector(".yao-mark").textContent = line ? line.label : "待摇";
  });
  castTitle.textContent = state.lines.length >= 6 ? "结果成形" : `已抛 ${state.lines.length} / 6`;
}

function showResult() {
  const reading = buildReading();
  state.pages = reading.pages;
  resultTopic.textContent = topicNames[state.topic] || "问事";
  resultTitle.textContent = reading.title;
  renderPages();
  setResultPage(0);
  setStage("result");
}

function getTrigram(lines) {
  const key = lines.map((line) => line.yang ? "1" : "0").join("");
  return trigramMap[key] || trigramMap["000"];
}

function getHexagram(upper, lower) {
  return {
    name: hexagramNames[`${upper.name}${lower.name}`] || `${upper.image}${lower.image}之象`
  };
}

function getDirectSummary(upper, lower, tone) {
  const toneText = {
    good: "这件事不是死局，有推进空间，但要按步骤来。",
    mixed: "这件事还没定，别急着押结论，先看下一步反馈。",
    blocked: "这件事现在卡得比较明显，先处理阻力，再谈结果。"
  }[tone];
  return `${toneText}外面主要是${getOuterText(upper)}，你这边先做的是${getInnerText(lower)}。`;
}

function getOuterText(trigram) {

  return map[trigram.name] || getPlainImage(trigram);
}

    坎: "风险、反复、信息不清楚",
    艮: "停住、边界、暂时过不去",
    坤: "等待、承接、先配合局面"
  };

}

function getImageReading(upper, lower, hexagram, tone) {

function getSuccessSignal(tone, moving) {

function getBlockSignal(upper, lower, tone) {

function getTone(yang, moving) {
  if (yang >= 4 && moving <= 2) return "good";
  if (yang <= 2 && moving >= 2) return "blocked";

}

function getDoDont(topic, tone) {
  const shared = {
    general: ["先把问题说具体", "不要同时问很多件事"],
    choice: ["先确认一个关键事实", "不要为了快点结束焦虑而乱决定"],
    relationship: ["看持续行动，不只听表态", "不要用逼问换安全感"],
    career: ["问清职责、资源和回报", "不要在条件模糊时先承诺"],
    wealth: ["先算现金流和风险边界", "不要冲动加码投入"],
    study: ["补最薄弱的考点", "不要用焦虑代替复习"],
    document: ["核对材料和时限", "不要在规则不清时反复提交"],
    message: ["等一个明确节点", "不要连续催促消耗关系"],
    travel: ["准备备用路线", "不要临时冒进"],
    lost: ["按时间线倒查", "不要没有线索地乱翻"],
    cooperation: ["先小范围试合作", "不要口头承诺大投入"],
    family: ["先找能协调的人", "不要把情绪当结论"],
    wellbeing: ["先减负和恢复节奏", "不要硬扛消耗"],
    timing: ["用三天到一周观察变化", "不要把短期波动当最终结果"],
    other: ["先做最小一步验证", "不要把猜测当事实"]
  };
  const [good, avoid] = shared[topic] || shared.other;
  if (tone === "blocked") return { good: `${good}，并把节奏放慢`, avoid };
  if (tone === "good") return { good: `${good}，可以小步推进`, avoid };
  return { good: `${good}，边走边看反馈`, avoid };
}

function renderPages() {
  signStage.replaceChildren();
  miniHexagram.replaceChildren();
  state.lines.forEach((line) => {
    const row = document.createElement("span");
    row.className = `${line.yang ? "is-yang" : "is-yin"}${line.moving ? " is-moving" : ""}`;
    row.innerHTML = line.yang ? "<i></i>" : "<i></i><i></i>";
    miniHexagram.append(row);
  });
  state.pages.forEach((page, index) => {
    const card = document.createElement("article");
    card.className = `sign-card sign-${page.kind}`;
    card.dataset.index = String(index);
    card.innerHTML = `
      <span class="sign-motif" aria-hidden="true">${page.motif}</span>
      <span class="sign-label">${page.label}</span>
      <h3>${page.title}</h3>
      <p>${page.lead}</p>
      <ul class="plain-list">
        ${page.points.map((point) => `<li>${point}</li>`).join("")}
      </ul>
      <div class="advice-strip">
        <div><span>宜</span><strong>${page.good}</strong></div>
        <div><span>忌</span><strong>${page.avoid}</strong></div>
      </div>
    `;
    signStage.append(card);
  });
}

function setResultPage(nextIndex, direction = "next") {
  const cards = [...signStage.querySelectorAll(".sign-card")];
  if (!cards.length) return;
  const page = Math.max(0, Math.min(nextIndex, cards.length - 1));
  const previous = state.page;
  if (state.turningTimer) window.clearTimeout(state.turningTimer);
  cards.forEach((card) => card.classList.remove("is-exiting", "exit-next", "exit-prev", "enter-next", "enter-prev"));
  if (page !== previous) {
    const exitDirection = page > previous ? "next" : "prev";
    cards[previous]?.classList.add("is-exiting", `exit-${exitDirection}`);
    cards[page]?.classList.add(`enter-${exitDirection}`);
    state.turningTimer = window.setTimeout(() => {
      cards.forEach((card) => card.classList.remove("is-exiting", "exit-next", "exit-prev", "enter-next", "enter-prev"));
    }, 460);
  }
  state.page = page;
  cards.forEach((card, index) => card.classList.toggle("is-current", index === page));
  resultCount.textContent = `${page + 1} / ${cards.length}`;
  signName.textContent = state.pages[page].title;
  signHint.textContent = page >= cards.length - 1 ? "右滑回上一签" : "左滑看下一签";
  prevSign.disabled = page === 0;
  nextSign.disabled = page === cards.length - 1;
}

function finishSwipe(dx, dy) {
  if (Math.abs(dx) < 52 || Math.abs(dx) < Math.abs(dy) * 1.08) return;
  setResultPage(state.page + (dx < 0 ? 1 : -1), dx < 0 ? "next" : "prev");
}

</script>
  <script>
(function () {
  const routeSelector = "a[href]:not([target]):not([download])";
  const canAnimate = !window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  document.documentElement.classList.add("route-ready");

  window.addEventListener("pageshow", () => {
    document.body.classList.remove("is-leaving");
  });

  document.addEventListener("click", (event) => {
    const link = event.target.closest(routeSelector);
    if (!link || event.defaultPrevented) return;
    if (event.metaKey || event.ctrlKey || event.shiftKey || event.altKey) return;

    const target = new URL(link.href, window.location.href);
    const current = new URL(window.location.href);
    if (target.href === current.href) {
      event.preventDefault();
      return;
    }
    if (target.hash && target.pathname === current.pathname) return;
    if (target.protocol !== current.protocol) return;
    if (target.origin !== current.origin) return;

    event.preventDefault();
    if (!canAnimate) {
      window.location.href = target.href;
      return;
    }

    document.body.classList.add("is-leaving");
    window.setTimeout(() => {
      window.location.href = target.href;
    }, 220);
  });
})();

</script>
